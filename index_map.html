l) { const otherCard = otherEl.querySelector('.student-marker-card'); if (otherCard) otherCard.classList.remove('selected'); } } }); clearSelectedMarker(); activeStudentId = student.studentId; selectedMarker = marker; const latlng = marker.getLatLng(); map.setView(latlng, zoom, { animate: true }); marker.setZIndexOffset(10000); const el = marker.getElement(); if (el) { const card = el.querySelector('.student-marker-card'); if (card) card.classList.add('selected'); } setTimeout(() => { if (activeStudentId === student.studentId) marker.openPopup(); }, 220); } function escapeHtml(str) { return String(str || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m])); } function initials(name) { return String(name || '?').trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase() || '?'; } function hasPhoto(url) { return /^https?:\/\ function offsetLatLng(lat, lng, index, total) { if (total <= 1) return [lat, lng]; const ring = Math.floor(index / 8) + 1; const angle = (index % 8) * (Math.PI * 2 / Math.min(total, 8)); const radius = 0.105 * ring; return [lat + Math.sin(angle) * radius, lng + Math.cos(angle) * radius]; } function markerHtml(student) { const safeName = escapeHtml(student.name); const safeDistrict = escapeHtml(student.district); const photo = hasPhoto(student.photoUrl) ? `<img class="marker-photo" src="${escapeHtml(student.photoUrl)}" alt="${safeName}" onerror="this.replaceWith(makeInitialsNode('${escapeHtml(initials(student.name))}','marker-initials'))">` : `<div class="marker-initials">${escapeHtml(initials(student.name))}</div>`; return `<div class="student-marker-card" title="${safeName} — ${safeDistrict}">${photo}</div>`; } function popupHtml(student) { const photo = hasPhoto(student.photoUrl) ? `<img src="${escapeHtml(student.photoUrl)}" alt="${escapeHtml(student.name)}" onerror="this.style.display='none'">` : `<div class="popup-initials">${escapeHtml(initials(student.name))}</div>`; return `<div class="popup-card">${photo}<div class="popup-name">${escapeHtml(student.name)}</div><div class="popup-meta">ID: ${escapeHtml(student.studentId)}</div><div class="popup-meta">District: <b>${escapeHtml(student.district)}</b></div><div class="popup-meta">Address: ${escapeHtml(student.permanentAddress)}</div></div>`; } function makeInitialsNode(text, cls) { const div = document.createElement('div'); div.className = cls; div.textContent = text || '?'; return div; } window.makeInitialsNode = makeInitialsNode; function renderMarkers(list) { closeStudentDetail(); markerMap.forEach(marker => map.removeLayer(marker)); markerMap.clear(); bounds.length = 0; const locationCounts = {}; list.forEach(s => { const coord = getStudentCoord(s); if (!coord) return; const key = coordKey(coord); locationCounts[key] = (locationCounts[key] || 0) + 1; }); const locationIndex = {}; list.forEach(student => { const coord = getStudentCoord(student); if (!coord) return; const key = coordKey(coord); const idx = locationIndex[key] || 0; locationIndex[key] = idx + 1; const [lat, lng] = offsetLatLng(coord.lat, coord.lng, idx, locationCounts[key]); const icon = L.divIcon({ className: 'custom-div-icon', html: markerHtml(student), iconSize: [38, 38], iconAnchor: [19, 19], popupAnchor: [0, -22] }); const marker = L.marker([lat, lng], { icon, riseOnHover: true, pane: 'studentMarkersPane', zIndexOffset: 500 }).addTo(map); marker.bindPopup(popupHtml(student), { autoPan: true, keepInView: true, minWidth: 240, maxWidth: 300, closeButton: true, autoClose: true, closeOnClick: true, className: 'student-popup-only' }); marker.bindTooltip(`${student.name} — ${student.permanentAddress}`, { sticky: true, offset: [0, -18], direction: 'top' }); marker.on('click', (e) => { if (e && e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent); focusStudent(student, marker); }); markerMap.set(student.studentId, marker); bounds.push([lat, lng]); }); refreshDistrictLabels(list); if (districtBoundaryLayer) districtBoundaryLayer.setStyle(districtStyle); } function renderStudentList(list) { const box = document.getElementById('studentList'); box.innerHTML = ''; list.forEach(student => { const row = document.createElement('div'); row.className = 'student-row'; const photo = hasPhoto(student.photoUrl) ? `<img src="${escapeHtml(student.photoUrl)}" alt="${escapeHtml(student.name)}" onerror="this.replaceWith(makeInitialsNode('${escapeHtml(initials(student.name))}','initials-small'))">` : `<div class="initials-small">${escapeHtml(initials(student.name))}</div>`; row.innerHTML = `${photo}<div><div class="row-name">${escapeHtml(student.name)}</div><div class="row-meta">ID: ${escapeHtml(student.studentId)} • ${escapeHtml(student.district)}</div></div>`; row.addEventListener('click', () => { const marker = markerMap.get(student.studentId); if (marker) { focusStudent(student, marker, 10.2); } }); box.appendChild(row); }); } function applyFilter() { const q = document.getElementById('searchBox').value.toLowerCase().trim(); const filtered = studentsData.filter(s => s.name.toLowerCase().includes(q) || s.studentId.toLowerCase().includes(q) || s.district.toLowerCase().includes(q) || s.permanentAddress.toLowerCase().includes(q) ); renderMarkers(filtered); renderStudentList(filtered); } document.getElementById('totalStudents').textContent = studentsData.length; document.getElementById('totalDistricts').textContent = new Set(studentsData.map(s => s.district)).size; document.getElementById('searchBox').addEventListener('input', applyFilter); map.on('click', () => closeStudentDetail()); loadDistrictBorders(); applyFilter(); setTimeout(() => { map.invalidateSize(); if (bounds.length) { map.fitBounds(bounds, { padding: [35, 35], maxZoom: 8.35 }); setTimeout(() => { const currentZoom = map.getZoom(); map.setZoom(Math.min(currentZoom + 0.55, 8.35), { animate: true }); }, 180); } }, 250); </script></body></html>
